<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#cba6f7"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Notebook body -->
  <rect x="168" y="112" width="688" height="800" rx="48" ry="48" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Spine -->
  <rect x="168" y="112" width="80" height="800" rx="48" ry="48" fill="url(#spine)"/>
  <rect x="208" y="112" width="40" height="800" fill="url(#spine)"/>

  <!-- Spine highlight line -->
  <line x1="232" y1="152" x2="232" y2="872" stroke="#9f67ff" stroke-width="3" stroke-opacity="0.5"/>

  <!-- Page lines (subtle) -->
  <line x1="320" y1="300" x2="760" y2="300" stroke="#fff" stroke-width="4" stroke-opacity="0.12" stroke-linecap="round"/>
  <line x1="320" y1="370" x2="760" y2="370" stroke="#fff" stroke-width="4" stroke-opacity="0.12" stroke-linecap="round"/>
  <line x1="320" y1="680" x2="760" y2="680" stroke="#fff" stroke-width="4" stroke-opacity="0.12" stroke-linecap="round"/>
  <line x1="320" y1="750" x2="760" y2="750" stroke="#fff" stroke-width="4" stroke-opacity="0.12" stroke-linecap="round"/>

  <!-- Play button triangle -->
  <polygon points="460,380 460,644 680,512" fill="#fff" opacity="0.95"/>
</svg>
