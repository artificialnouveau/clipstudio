<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f7ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="play-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Notebook page (white, slightly rotated for depth) -->
  <g transform="translate(512, 512) rotate(-2) translate(-512, -512)">
    <rect x="250" y="160" width="530" height="700" rx="24" fill="url(#page)" opacity="0.4"/>
  </g>

  <!-- Notebook page (front) -->
  <rect x="270" y="170" width="520" height="690" rx="24" fill="url(#page)"/>

  <!-- Notebook binding rings -->
  <g fill="none" stroke="#4c1d95" stroke-width="10" opacity="0.6">
    <circle cx="270" cy="300" r="18"/>
    <circle cx="270" cy="420" r="18"/>
    <circle cx="270" cy="540" r="18"/>
    <circle cx="270" cy="660" r="18"/>
  </g>

  <!-- Text lines on page -->
  <rect x="340" y="260" width="280" height="10" rx="5" fill="#c4b5fd" opacity="0.5"/>
  <rect x="340" y="295" width="200" height="10" rx="5" fill="#c4b5fd" opacity="0.35"/>
  <rect x="340" y="680" width="260" height="10" rx="5" fill="#c4b5fd" opacity="0.35"/>
  <rect x="340" y="715" width="180" height="10" rx="5" fill="#c4b5fd" opacity="0.25"/>
  <rect x="340" y="750" width="220" height="10" rx="5" fill="#c4b5fd" opacity="0.25"/>

  <!-- Play button circle -->
  <circle cx="530" cy="490" r="120" fill="url(#play-grad)" opacity="0.9"/>

  <!-- Play triangle -->
  <polygon points="500,430 500,550 600,490" fill="#fff"/>
</svg>
